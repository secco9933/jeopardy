<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeopardy AI</title>
<style>
  :root {
    --blue: #1a56a0;
    --blue-dark: #0d3d7a;
    --blue-mid: #2d6dbf;
    --gold: #f0b429;
    --bg: #0a1628;
    --surface: #112240;
    --surface2: #1a3050;
    --text: #e8eef8;
    --text-muted: #8aa0c0;
    --green: #22c55e;
    --red: #ef4444;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--surface); border-bottom: 2px solid var(--gold); padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; color: var(--gold); text-transform: uppercase; }
  main { flex: 1; padding: 24px 16px; max-width: 700px; width: 100%; margin: 0 auto; }
  .screen { display: none; }
  .screen.active { display: block; }

  .section-title { font-size: 13px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; border: 1px solid var(--surface2); }

  .form-group { margin-bottom: 12px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
  .form-group input, .form-group select {
    width: 100%; padding: 10px 13px; font-size: 15px;
    background: var(--surface2); border: 1px solid #2a4060;
    border-radius: var(--radius-sm); color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--blue-mid); }
  .form-group input::placeholder { color: var(--text-muted); opacity: 0.6; }
  .form-group input[type="password"] { letter-spacing: 2px; }

  .key-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }
  .key-hint a { color: #7eb3f0; text-decoration: none; }
  .key-hint a:hover { text-decoration: underline; }

  .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px 20px; font-size: 15px; font-weight: 600;
    border-radius: var(--radius-sm); border: none; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-primary { background: var(--gold); color: #0a1628; }
  .btn-primary:hover:not(:disabled) { background: #e0a800; }
  .btn-blue { background: var(--blue); color: #fff; }
  .btn-blue:hover:not(:disabled) { background: var(--blue-dark); }
  .btn-ghost { background: var(--surface2); color: var(--text); }
  .btn-ghost:hover:not(:disabled) { background: #253a58; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-full { width: 100%; }
  .error { color: #f87171; font-size: 13px; margin-top: 8px; }

  .loading-wrap { text-align: center; padding: 60px 0; }
  .loader { width: 44px; height: 44px; border: 3px solid var(--surface2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap p { color: var(--text-muted); font-size: 15px; }

  .board-wrap { margin-bottom: 16px; }
  .board-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 5px; }
  .cat-cell { background: var(--blue-dark); border-radius: var(--radius-sm); padding: 10px 6px; font-size: 11px; font-weight: 700; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; color: #c8d8f0; min-height: 54px; display: flex; align-items: center; justify-content: center; line-height: 1.3; }
  .board-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  .cell-btn { background: var(--blue); border: none; border-radius: var(--radius-sm); color: var(--gold); font-size: 18px; font-weight: 700; cursor: pointer; padding: 0; aspect-ratio: 1.5/1; display: flex; align-items: center; justify-content: center; transition: background 0.15s, transform 0.1s; font-family: inherit; }
  .cell-btn:hover:not(:disabled) { background: var(--blue-mid); transform: scale(1.03); }
  .cell-btn:active:not(:disabled) { transform: scale(0.97); }
  .cell-btn:disabled { background: var(--surface2); color: transparent; cursor: default; transform: none; }

  .scores-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .score-card { flex: 1; min-width: 70px; background: var(--surface); border: 1px solid var(--surface2); border-radius: var(--radius-sm); padding: 8px 10px; text-align: center; }
  .score-card .s-name { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .score-card .s-pts { font-size: 20px; font-weight: 700; color: var(--gold); }
  .score-card.leading { border-color: var(--gold); }

  .q-meta { font-size: 12px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 12px; }
  .q-text { font-size: 20px; line-height: 1.5; color: var(--text); margin-bottom: 20px; }
  .answer-block { background: var(--surface2); border-left: 3px solid var(--gold); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 12px 16px; margin-bottom: 20px; }
  .answer-block .a-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .answer-block .a-text { font-size: 17px; font-weight: 600; color: var(--text); }
  .answer-block .a-hint { font-size: 13px; color: var(--text-muted); margin-top: 6px; line-height: 1.4; font-style: italic; }

  .team-select-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .team-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .t-btn { padding: 8px 16px; font-size: 13px; font-weight: 600; background: var(--surface2); border: 1px solid #2a4060; border-radius: 20px; color: var(--text); cursor: pointer; transition: background 0.15s, border-color 0.15s; }
  .t-btn:hover { background: #253a58; }
  .t-btn.selected { background: var(--blue); border-color: var(--blue-mid); color: #fff; }
  .action-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  .feedback-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--surface2); }
  .fb-group { display: flex; align-items: center; gap: 6px; }
  .fb-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-right: 2px; }
  .fb-btn { padding: 5px 10px; font-size: 13px; background: var(--surface2); border: 1px solid #2a4060; border-radius: 16px; color: var(--text); cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.1s; }
  .fb-btn:hover { background: #253a58; }
  .fb-btn:active { transform: scale(0.94); }
  .fb-btn.sel-up { background: rgba(34,197,94,0.2); border-color: var(--green); }
  .fb-btn.sel-down { background: rgba(239,68,68,0.2); border-color: var(--red); }
  .fb-btn.sel-diff { background: var(--blue); border-color: var(--blue-mid); color: #fff; }

  .winner-wrap { text-align: center; padding: 40px 0; }
  .trophy { font-size: 60px; margin-bottom: 12px; }
  .winner-label { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .winner-name { font-size: 32px; font-weight: 700; color: var(--gold); margin: 8px 0 28px; }
  .podium { max-width: 320px; margin: 0 auto 28px; display: flex; flex-direction: column; gap: 8px; }
  .podium-row { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border-radius: var(--radius-sm); padding: 10px 16px; border: 1px solid var(--surface2); }
  .podium-row.first { border-color: var(--gold); }
  .podium-row .p-name { font-size: 15px; font-weight: 600; }
  .podium-row .p-score { font-size: 17px; font-weight: 700; color: var(--gold); }
</style>
</head>
<body>

<header>
  <h1>Jeopardy <span style="color:var(--gold)">AI</span></h1>
  <span style="margin-left:auto;font-size:12px;color:var(--text-muted);font-weight:400;">v8</span>
</header>

<div id="global-error" style="display:none;background:#A32D2D;color:#fff;padding:12px 16px;font-size:13px;font-family:monospace;"></div>

<main>

  <!-- SCREEN 0: API KEY -->
  <div id="s-apikey" class="screen active">
    <div class="card">
      <div class="section-title">Configurazione</div>
      <div class="form-group">
        <label>Anthropic API Key</label>
        <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
        <p class="key-hint">
          La key viene usata solo in questa sessione e non viene mai salvata.<br>
          Non ce l'hai? Creane una su <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a>
        </p>
      </div>
      <button class="btn btn-primary btn-full" id="btn-confirm-key" style="margin-top:8px;">Continua</button>
      <p class="error" id="key-error"></p>
    </div>
  </div>

  <!-- SCREEN 1: SETUP -->
  <div id="s-setup" class="screen">
    <div class="card">
      <div class="section-title">Categorie</div>
      <div class="form-group"><label>Categoria 1</label><input id="cat0" type="text" placeholder="es. Storia d'Italia"></div>
      <div class="form-group"><label>Categoria 2</label><input id="cat1" type="text" placeholder="es. Sport"></div>
      <div class="form-group"><label>Categoria 3</label><input id="cat2" type="text" placeholder="es. Cinema"></div>
      <div class="form-group"><label>Categoria 4</label><input id="cat3" type="text" placeholder="es. Scienza"></div>
      <div class="form-group"><label>Categoria 5</label><input id="cat4" type="text" placeholder="es. Musica"></div>
    </div>
    <div class="card">
      <div class="section-title">Squadre</div>
      <div class="form-group">
        <label>Numero di squadre</label>
        <select id="num-teams">
          <option value="2">2 squadre</option>
          <option value="3">3 squadre</option>
          <option value="4">4 squadre</option>
          <option value="5">5 squadre</option>
          <option value="6">6 squadre</option>
        </select>
      </div>
      <div id="team-names-grid" class="teams-grid"></div>
    </div>
    <button class="btn btn-primary btn-full" id="btn-generate">⚡ Genera il tabellone</button>
    <p class="error" id="setup-error"></p>
    <div id="fb-stats" style="text-align:center;margin-top:14px;font-size:12px;color:var(--text-muted);"></div>

  <!-- SCREEN 2: LOADING -->
  <div id="s-loading" class="screen">
    <div class="loading-wrap">
      <div class="loader"></div>
      <p>L'AI sta generando le domande per ogni categoria…</p>
      <p id="loading-status" style="font-size:13px;color:var(--text-muted);margin-top:10px;"></p>
    </div>
  </div>

  <!-- SCREEN 3: BOARD -->
  <div id="s-board" class="screen">
    <div id="scores-bar" class="scores-bar"></div>
    <div class="board-wrap">
      <div class="board-header" id="board-header"></div>
      <div class="board-grid" id="board-grid"></div>
    </div>
    <button class="btn btn-ghost btn-full" id="btn-end" style="font-size:12px;padding:8px;margin-top:8px;">Termina partita</button>
  </div>

  <!-- SCREEN 4: QUESTION -->
  <div id="s-question" class="screen">
    <div class="card">
      <div class="q-meta" id="q-meta"></div>
      <div class="q-text" id="q-text"></div>
      <div id="ans-block" class="answer-block" style="display:none;">
        <div class="a-label">Risposta</div>
        <div class="a-text" id="q-answer"></div>
        <div class="a-hint" id="q-hint"></div>
      </div>
      <button class="btn btn-blue btn-full" id="btn-show-ans">Mostra risposta</button>
    </div>
    <div id="assign-ui" style="display:none;">
      <div class="card">
        <div class="team-select-label">Quale squadra risponde?</div>
        <div class="team-btns" id="team-btns"></div>
        <div class="action-row">
          <button class="btn btn-success" id="btn-correct" disabled>✓ Corretta</button>
          <button class="btn btn-danger" id="btn-wrong" disabled>✗ Sbagliata</button>
          <button class="btn btn-ghost" id="btn-skip">— Nessuno</button>
        </div>
        <div class="feedback-row" id="feedback-row">
          <div class="fb-group">
            <span class="fb-label">Domanda</span>
            <button class="fb-btn" id="fb-up" title="Bella domanda">👍</button>
            <button class="fb-btn" id="fb-down" title="Non valida / brutta">👎</button>
          </div>
          <div class="fb-group">
            <span class="fb-label">Difficoltà</span>
            <button class="fb-btn" id="fb-easy" title="Troppo facile">😴 Facile</button>
            <button class="fb-btn" id="fb-hard" title="Troppo difficile">🔥 Difficile</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCREEN 5: WINNER -->
  <div id="s-winner" class="screen">
    <div class="winner-wrap">
      <div class="trophy">🏆</div>
      <div class="winner-label">Vincitore</div>
      <div class="winner-name" id="winner-name"></div>
      <div class="podium" id="podium"></div>
      <button class="btn btn-primary" id="btn-restart">Nuova partita</button>
      <button class="btn btn-ghost" id="btn-forget-key" style="margin-top:10px;font-size:12px;padding:8px 16px;">Dimentica API key</button>
    </div>
  </div>

</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script>

  storageBucket: "jeopardy-ai-5734c.firebasestorage.app",
  messagingSenderId: "1049173799414",
  appId: "1:1049173799414:web:820e305732b7d591b097d7"

<script>
// Cattura-errori globale: mostra a schermo qualsiasi crash invece di lasciare la pagina vuota
window.addEventListener('error', function(ev) {
  var box = document.getElementById('global-error');
  if (box) { box.style.display = 'block'; box.textContent = '⚠ Errore: ' + (ev.message || ev.error) + (ev.filename ? ' (' + ev.filename.split('/').pop() + ':' + ev.lineno + ')' : ''); }
});
const VALUES = [100, 200, 300, 400, 500];
let state = {};
let apiKey = '';

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 's-setup') refreshFbStats();
}

async function refreshFbStats() {
  const el = document.getElementById('fb-stats');
  if (!el) return;
  if (!db) { el.textContent = 'Feedback non attivi (Firebase non configurato)'; return; }
  try {
    const snap = await db.collection('feedback').get();
    const count = snap.size;
    if (count === 0) { el.innerHTML = 'Nessun feedback ancora raccolto'; return; }
    el.innerHTML = `📊 ${count} feedback raccolti per calibrare le domande &nbsp;·&nbsp; <a href="#" id="fb-reset" style="color:#7eb3f0;text-decoration:none;">azzera</a>`;
    const reset = document.getElementById('fb-reset');
    if (reset) reset.onclick = async (e) => {
      e.preventDefault();
      if (!confirm('Azzerare tutti i feedback raccolti? L\'azione è irreversibile.')) return;
      el.textContent = 'Azzeramento in corso…';
      const all = await db.collection('feedback').get();
      const batch = db.batch();
      all.forEach(d => batch.delete(d.ref));
      await batch.commit();
      refreshFbStats();
    };
  } catch (e) {
    el.textContent = '';
  }
}

// ---- API KEY SCREEN ----
// Carica key salvata (localStorage può fallire su file://, quindi proteggo)
let savedKey = null;
try {
  savedKey = localStorage.getItem('jeopardy_api_key');
} catch (e) {
  console.warn('localStorage non accessibile:', e.message);
}
try {
  if (savedKey) {
    apiKey = savedKey;
    renderTeamInputs();
    show('s-setup');
  } else {
    show('s-apikey');
  }
} catch (e) {
  // Se l'avvio fallisce, mostro comunque la schermata della key
  document.getElementById('s-apikey').classList.add('active');
  const box = document.getElementById('global-error');
  if (box) { box.style.display = 'block'; box.textContent = '⚠ Errore avvio: ' + e.message; }
}

document.getElementById('btn-confirm-key').addEventListener('click', () => {
  const key = document.getElementById('api-key').value.trim();
  const err = document.getElementById('key-error');
  if (!key.startsWith('sk-ant-')) {
    err.textContent = 'La key deve iniziare con "sk-ant-".';
    return;
  }
  apiKey = key;
  try { localStorage.setItem('jeopardy_api_key', key); } catch(e) {}
  err.textContent = '';
  renderTeamInputs();
  show('s-setup');
});
document.getElementById('api-key').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-confirm-key').click();
});

// ---- SETUP SCREEN ----
function renderTeamInputs() {
  const n = parseInt(document.getElementById('num-teams').value);
  const grid = document.getElementById('team-names-grid');
  const prev = {};
  grid.querySelectorAll('input').forEach((el, i) => prev[i] = el.value);
  grid.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const val = prev[i] || `Squadra ${i + 1}`;
    const div = document.createElement('div');
    div.className = 'form-group';
    div.style.marginBottom = '0';
    div.innerHTML = `<label>Squadra ${i + 1}</label><input type="text" id="tname${i}" value="${val}">`;
    grid.appendChild(div);
  }
}

document.getElementById('num-teams').addEventListener('change', renderTeamInputs);

document.getElementById('btn-generate').addEventListener('click', async () => {
  const genBtn = document.getElementById('btn-generate');
  if (genBtn.disabled) return; // blocco anti doppio-click
  const cats = [0,1,2,3,4].map(i => document.getElementById(`cat${i}`).value.trim());
  const err = document.getElementById('setup-error');
  if (cats.some(c => !c)) { err.textContent = 'Inserisci tutte e 5 le categorie.'; return; }
  err.textContent = '';
  genBtn.disabled = true;

  const n = parseInt(document.getElementById('num-teams').value);
  const teams = Array.from({length: n}, (_, i) => {
    const el = document.getElementById(`tname${i}`);
    return (el && el.value.trim()) || `Squadra ${i + 1}`;
  });

  state = { cats, teams, scores: new Array(n).fill(0), questions: [], used: new Set(), cur: null, selTeam: null, curFeedback: { liked: null, difficulty: null } };
  show('s-loading');

  try {
    // Carico i feedback delle partite precedenti (con timeout: non deve mai bloccare la generazione)
    let fbContext = '';
    try {
      fbContext = await Promise.race([
        loadFeedbackContext(),
        new Promise(resolve => setTimeout(() => resolve(''), 4000))
      ]);
    } catch (e) { fbContext = ''; }
    // Una chiamata per categoria, in parallelo: il modello resta concentrato su un solo tema
    const statusEl = document.getElementById('loading-status');
    let done = 0;
    if (statusEl) statusEl.textContent = `Categorie completate: 0/${cats.length}`;
    const promises = cats.map((cat, catIdx) =>
      generateCategory(cat, catIdx, fbContext).then(r => {
        done++;
        if (statusEl) statusEl.textContent = `Categorie completate: ${done}/${cats.length}`;
        return r;
      })
    );
    const settled = await Promise.allSettled(promises);

    // Raccolgo le domande riuscite e segnalo eventuali categorie fallite
    const failed = [];
    settled.forEach((s, i) => {
      if (s.status === 'fulfilled') {
        state.questions.push(...s.value);
      } else {
        failed.push(`"${cats[i]}": ${s.reason && s.reason.message ? s.reason.message : s.reason}`);
      }
    });

    if (failed.length) {
      throw new Error('Alcune categorie non sono state generate → ' + failed.join(' | '));
    }
    if (state.questions.length < 25) {
      throw new Error('Generate solo ' + state.questions.length + ' domande su 25. Riprova.');
    }
    renderBoard();
    show('s-board');
  } catch (e) {
    show('s-setup');
    document.getElementById('setup-error').textContent = 'Errore: ' + (e.message || 'Controlla la connessione e riprova.');
  } finally {
    document.getElementById('btn-generate').disabled = false;
  }
});

async function loadFeedbackContext() {
  if (!db) return '';
  let docs = [];
  try {
    const snap = await db.collection('feedback').orderBy('ts', 'desc').limit(300).get();
    snap.forEach(d => docs.push(d.data()));
  } catch (e) {
    console.warn('Lettura feedback fallita:', e.message);
    return '';
  }
  if (docs.length === 0) return '';

  // Aggrego la taratura difficoltà per valore
  const byValue = {};
  VALUES.forEach(v => byValue[v] = { easy: 0, hard: 0, total: 0 });
  docs.forEach(d => {
    if (d.difficulty && byValue[d.value]) {
      byValue[d.value].total++;
      if (d.difficulty === 'easy') byValue[d.value].easy++;
      if (d.difficulty === 'hard') byValue[d.value].hard++;
    }
  });

  const diffLines = [];
  VALUES.forEach(v => {
    const b = byValue[v];
    if (b.total < 3) return; // troppo pochi dati per questa fascia
    if (b.easy / b.total >= 0.5) diffLines.push(`- Le domande da ${v} risultano spesso TROPPO FACILI: rendile più difficili.`);
    else if (b.hard / b.total >= 0.5) diffLines.push(`- Le domande da ${v} risultano spesso TROPPO DIFFICILI: rendile più accessibili.`);
  });

  // Esempi apprezzati e non graditi
  const liked = docs.filter(d => d.liked === true).slice(0, 8);
  const disliked = docs.filter(d => d.liked === false).slice(0, 5);

  let block = '\n\nFEEDBACK DALLE PARTITE PRECEDENTI (usali per calibrare meglio le domande):';
  if (diffLines.length) block += '\nTaratura difficoltà:\n' + diffLines.join('\n');
  if (liked.length) block += '\nDomande molto apprezzate dai giocatori (imita questo stile e taglio):\n' + liked.map(d => `- [${d.cat} ${d.value}] ${d.q}`).join('\n');
  if (disliked.length) block += '\nDomande NON gradite (evita domande simili a queste):\n' + disliked.map(d => `- [${d.cat} ${d.value}] ${d.q}`).join('\n');
  return block;
}

async function generateCategory(cat, catIdx, fbContext) {
  const prompt = `Genera 5 domande in italiano per un gioco Jeopardy, TUTTE ed esclusivamente sul tema: "${cat}".

REGOLE:
1. Ogni singola domanda DEVE riguardare "${cat}". Non sconfinare MAI in altri argomenti. Se "${cat}" è un tema di nicchia, fai domande più semplici ma sempre su "${cat}".
2. ★ NON INVENTARE ★ — Includi solo fatti di cui sei certo. NON aggiungere dettagli "decorativi" rischiosi come veri nomi anagrafici, date precise, soprannomi o numeri specifici se non sei assolutamente sicuro: nel dubbio, ometti il dettaglio e fai una domanda più semplice e diretta. Meglio una domanda facile e corretta che una difficile e sbagliata.
3. Evita classifiche, record o statistiche che cambiano nel tempo.
4. Le 5 domande hanno difficoltà crescente in base al valore:
   - 100: facilissima, la sa chiunque conosca un po' "${cat}"
   - 200: facile
   - 300: media
   - 400: difficile, per appassionati
   - 500: molto difficile, per veri esperti — ma risposta CERTA
${fbContext || ''}

La tua risposta deve iniziare con { e finire con }. Niente testo prima o dopo, niente backtick. Solo JSON puro.
Formato esatto:
{"questions":[{"value":100,"q":"testo domanda","a":"risposta breve","hint":"breve spiegazione della risposta"},{"value":200,...},{"value":300,...},{"value":400,...},{"value":500,...}]}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1500,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  // Con la ricerca web la risposta ha più blocchi: il JSON è nell'ultimo blocco di testo
  const textBlocks = data.content.filter(b => b.type === 'text').map(b => b.text);
  let raw = (textBlocks[textBlocks.length - 1] || textBlocks.join('') || '').replace(/```json|```/g, '');

  let parsed;
  try {
    const start = raw.indexOf('{');
    const end = raw.lastIndexOf('}');
    if (start === -1 || end === -1) throw new Error('no json');
    parsed = JSON.parse(raw.slice(start, end + 1));
  } catch (parseErr) {
    const objs = raw.match(/\{[^{}]*"value"[^{}]*\}/g) || [];
    if (objs.length === 0) throw new Error('Risposta non valida per "' + cat + '". Riprova.');
    parsed = { questions: JSON.parse('[' + objs.join(',') + ']') };
  }
  // Assegno il catIdx a ogni domanda
  return parsed.questions.map(q => ({ ...q, cat: catIdx }));
}

// ---- BOARD ----
function getQ(cat, value) {
  return state.questions.find(q => q.cat === cat && q.value === value);
}

function renderBoard() {
  const header = document.getElementById('board-header');
  const grid = document.getElementById('board-grid');
  header.innerHTML = state.cats.map(c => `<div class="cat-cell">${c}</div>`).join('');
  grid.innerHTML = '';
  VALUES.forEach(val => {
    state.cats.forEach((_, ci) => {
      const key = `${ci}-${val}`;
      const btn = document.createElement('button');
      btn.className = 'cell-btn';
      btn.dataset.cat = ci;
      btn.dataset.val = val;
      if (state.used.has(key)) {
        btn.disabled = true;
      } else {
        btn.textContent = val;
        btn.addEventListener('click', () => openQ(ci, val));
      }
      grid.appendChild(btn);
    });
  });
  renderScores();
}

function renderScores() {
  const max = Math.max(...state.scores);
  document.getElementById('scores-bar').innerHTML = state.teams.map((t, i) =>
    `<div class="score-card${state.scores[i] === max && max > 0 ? ' leading' : ''}">
      <div class="s-name">${t}</div>
      <div class="s-pts">${state.scores[i]}</div>
    </div>`
  ).join('');
}

// ---- QUESTION ----
function openQ(catIdx, value) {
  const q = getQ(catIdx, value);
  if (!q) return;
  state.cur = { catIdx, value };
  state.selTeam = null;
  state.curFeedback = { liked: null, difficulty: null };
  // reset visuals dei pulsanti feedback
  ['fb-up','fb-down','fb-easy','fb-hard'].forEach(id => {
    document.getElementById(id).classList.remove('sel-up','sel-down','sel-diff');
  });

  document.getElementById('q-meta').textContent = `${state.cats[catIdx]} — ${value} punti`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('ans-block').style.display = 'none';
  document.getElementById('q-answer').textContent = q.a;
  document.getElementById('q-hint').textContent = q.hint || '';
  document.getElementById('assign-ui').style.display = 'none';
  document.getElementById('btn-show-ans').style.display = 'flex';
  document.getElementById('btn-correct').disabled = true;
  document.getElementById('btn-wrong').disabled = true;

  document.getElementById('btn-show-ans').onclick = () => {
    document.getElementById('ans-block').style.display = 'block';
    document.getElementById('assign-ui').style.display = 'block';
    document.getElementById('btn-show-ans').style.display = 'none';
    renderTeamBtns();
  };

  show('s-question');
}

function renderTeamBtns() {
  const container = document.getElementById('team-btns');
  container.innerHTML = state.teams.map((t, i) =>
    `<button class="t-btn" data-i="${i}">${t}</button>`
  ).join('');
  container.querySelectorAll('.t-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.t-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.selTeam = parseInt(btn.dataset.i);
      document.getElementById('btn-correct').disabled = false;
      document.getElementById('btn-wrong').disabled = false;
    });
  });
}

function closeQ(delta) {
  if (state.selTeam !== null) {
    state.scores[state.selTeam] = Math.max(0, state.scores[state.selTeam] + delta);
  }
  saveFeedback();
  state.used.add(`${state.cur.catIdx}-${state.cur.value}`);
  if (state.used.size >= 25) { showWinner(); return; }
  renderBoard();
  show('s-board');
}

// ---- FEEDBACK ----
document.getElementById('fb-up').addEventListener('click', () => {
  const v = state.curFeedback.liked === true ? null : true;
  state.curFeedback.liked = v;
  document.getElementById('fb-up').classList.toggle('sel-up', v === true);
  document.getElementById('fb-down').classList.remove('sel-down');
});
document.getElementById('fb-down').addEventListener('click', () => {
  const v = state.curFeedback.liked === false ? null : false;
  state.curFeedback.liked = v;
  document.getElementById('fb-down').classList.toggle('sel-down', v === false);
  document.getElementById('fb-up').classList.remove('sel-up');
});
document.getElementById('fb-easy').addEventListener('click', () => {
  const v = state.curFeedback.difficulty === 'easy' ? null : 'easy';
  state.curFeedback.difficulty = v;
  document.getElementById('fb-easy').classList.toggle('sel-diff', v === 'easy');
  document.getElementById('fb-hard').classList.remove('sel-diff');
});
document.getElementById('fb-hard').addEventListener('click', () => {
  const v = state.curFeedback.difficulty === 'hard' ? null : 'hard';
  state.curFeedback.difficulty = v;
  document.getElementById('fb-hard').classList.toggle('sel-diff', v === 'hard');
  document.getElementById('fb-easy').classList.remove('sel-diff');
});

function saveFeedback() {
  const fb = state.curFeedback;
  if (!fb || (fb.liked === null && fb.difficulty === null)) return; // niente da salvare
  if (!db) return;
  const q = getQ(state.cur.catIdx, state.cur.value);
  if (!q) return;
  db.collection('feedback').add({
    cat: state.cats[state.cur.catIdx],
    value: state.cur.value,
    q: q.q,
    a: q.a,
    liked: fb.liked,
    difficulty: fb.difficulty,
    ts: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(e => console.warn('Salvataggio feedback fallito:', e.message));
}

document.getElementById('btn-correct').addEventListener('click', () => closeQ(state.cur.value));
document.getElementById('btn-wrong').addEventListener('click', () => closeQ(-state.cur.value));
document.getElementById('btn-skip').addEventListener('click', () => closeQ(0));
document.getElementById('btn-end').addEventListener('click', showWinner);

// ---- WINNER ----
function showWinner() {
  const sorted = state.teams.map((t, i) => ({ t, s: state.scores[i] })).sort((a, b) => b.s - a.s);
  document.getElementById('winner-name').textContent = sorted[0].t;
  const medals = ['🥇', '🥈', '🥉'];
  document.getElementById('podium').innerHTML = sorted.map((x, i) =>
    `<div class="podium-row${i === 0 ? ' first' : ''}">
      <span class="p-name">${medals[i] || `${i+1}.`} ${x.t}</span>
      <span class="p-score">${x.s}</span>
    </div>`
  ).join('');
  show('s-winner');
}

document.getElementById('btn-restart').addEventListener('click', () => {
  state = {};
  renderTeamInputs();
  show('s-setup');
});

document.getElementById('btn-forget-key').addEventListener('click', () => {
  try { localStorage.removeItem('jeopardy_api_key'); } catch(e) {}
  apiKey = '';
  state = {};
  document.getElementById('api-key').value = '';
  show('s-apikey');
});
</script>
